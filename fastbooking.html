<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<title>Book Appointment</title>

<style>
/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* ROOT COLORS (PRO DESIGN SYSTEM) */
:root {
  --primary: #1e88e5;
  --primary-light: #42a5f5;
  --bg: #f5f9ff;
  --card: rgba(255, 255, 255, 0.85);
  --text: #1a1a1a;
  --subtext: #6b7280;
  --border: rgba(0,0,0,0.08);
  --success: #16a34a;
}

/* BODY (MOBILE FIRST) */
body {
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(180deg, #ffffff, #eaf3ff);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
}

/* CONTAINER (CARD UI) */
.container {
  width: 100%;
  max-width: 380px;
  padding: 22px;
  border-radius: 18px;
  background: var(--card);
  backdrop-filter: blur(12px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
  text-align: center;
  animation: fadeIn 0.6s ease;
}

/* TITLE */
.container h1 {
  font-size: 24px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 4px;
}

/* SUBTEXT */
.container p {
  font-size: 13px;
  color: var(--subtext);
  margin-bottom: 18px;
}

/* INPUT GROUP */
.container input {
  width: 100%;
  padding: 13px 14px;
  margin: 6px 0;
  border-radius: 12px;
  border: 1px solid var(--border);
  font-size: 14px;
  background: #ffffff;
  color: var(--text);
  transition: all 0.25s ease;
}

/* PLACEHOLDER */
.container input::placeholder {
  color: #9ca3af;
}

/* INPUT FOCUS */
.container input:focus {
  border: 1px solid var(--primary);
  box-shadow: 0 0 0 3px rgba(30,136,229,0.15);
}

/* LOCATION BUTTON (SMART CTA) */
.loc-btn {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, #e3f2fd, #bbdefb);
  color: #0d47a1;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.25s ease;
}

/* ICON */
.loc-btn::before {
  content: "📍 ";
}

/* HOVER */
.loc-btn:hover {
  background: linear-gradient(135deg, var(--primary-light), var(--primary));
  color: white;
  transform: translateY(-1px);
}

/* ACTIVE */
.loc-btn:active {
  transform: scale(0.97);
}

/* DATE INPUT */
#datetime {
  width: 100%;
  padding: 13px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: #ffffff;
  color: var(--text);
}

/* MAIN BUTTON */
.container button:last-of-type {
  width: 100%;
  padding: 14px;
  margin-top: 14px;
  border-radius: 14px;
  border: none;
  font-size: 15px;
  font-weight: 600;
  background: linear-gradient(135deg, var(--primary-light), var(--primary));
  color: white;
  cursor: pointer;
  transition: all 0.25s ease;
  box-shadow: 0 8px 20px rgba(30,136,229,0.25);
}

/* HOVER */
.container button:last-of-type:hover {
  transform: translateY(-2px);
}

/* SUCCESS */
.success {
  display: none;
  margin-top: 12px;
  font-size: 13px;
  color: var(--success);
  font-weight: 500;
}

/* ANIMATION */
@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(15px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.info-btn {
  display: inline-block;
  padding: 8px 10px;
  margin-top: 10px;
  border-radius: 444px; /* pill shape */
  border: 1px solid #dbeafe;
  background: #f8fbff;
  color: #1e40af;
  font-size: 11px;
  cursor: pointer;
  transition: all 0.25s ease;
}

/* Hover effect */
.info-btn:hover {
  background: #1e40af;
  color: #ffffff;
  box-shadow: 0 4px 12px rgba(30,64,175,0.25);
  transform: translateY(-1px);
}


.book-btn {
  width: 100%;
  padding: 14px;
  margin-top: 14px;
  border-radius: 14px;
  border: none;
  font-size: 15px;
  font-weight: 600;
  background: linear-gradient(135deg, #42a5f5, #1e88e5);
  color: white;
  cursor: pointer;
  transition: all 0.25s ease;
  box-shadow: 0 8px 20px rgba(30,136,229,0.25);
}

.book-btn:hover {
  transform: translateY(-2px);
}

.book-btn:active {
  transform: scale(0.97);
}

.book-btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}



/* TABLET */
@media (min-width: 600px) {
  .container {
    padding: 28px;
    max-width: 420px;
  }

  .container h1 {
    font-size: 26px;
  }
}

/* DESKTOP */
@media (min-width: 1024px) {
  body {
    background: linear-gradient(135deg, #eef5ff, #dbeafe);
  }

  .container {
    max-width: 440px;
    border-radius: 20px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.12);
  }
}
</style>
</head>

<body>

<div class="container">
  <h1>Rapid Labs</h1>
  <p>Book Your Blood Test from Home</p>

  <input type="text" id="name" placeholder="Full Name" required>
  <input type="tel" id="mobile" placeholder="Mobile Number" required>
  <input type="text" id="testname" placeholder="Test Name (e.g. CBC, Thyroid)" required>
  <input type="text" id="location" placeholder="Your Location" required>

  <button class="loc-btn" onclick="getLocation()">Use My Current Location</button>

  <!-- ✅ NEW (replaces date + time) -->
  <input type="text" id="datetime" placeholder="Select Date & Time" required>

    <div class="success" id="successMsg">
    ✅ Booking Successful! Our team will contact you soon.
  </div>


<button class="book-btn" onclick="sendToTelegram()">Book Now</button>

  <button class="info-btn" onclick="visitWebsite()">
    Learn More About Our Tests on Our Website
  </button>
  


</div>




<script>
// ✅ INIT FLATPICKR AFTER PAGE LOAD
document.addEventListener("DOMContentLoaded", function () {
  flatpickr("#datetime", {
    enableTime: true,
    dateFormat: "Y-m-d h:i K",
    minDate: "today",
  });
});

// 📍 GET LOCATION
function getLocation() {
  let btn = document.querySelector(".loc-btn");
  btn.innerText = "Detecting location...";

  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(async function(position) {
      let lat = position.coords.latitude;
      let lon = position.coords.longitude;

      try {
        // 🔥 Convert lat/lon → address
        let response = await fetch(
          `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`
        );
        let data = await response.json();

        let address = data.address;

        // 🧠 Smart readable location
        let place = `${address.suburb || address.village || ""}, 
                     ${address.city || address.town || ""}`;

        document.getElementById("location").value = place;

        btn.innerText = "Location detected ✅";

      } catch (error) {
        document.getElementById("location").value = lat + ", " + lon;
        btn.innerText = "Use Current Location";
      }

    }, function() {
      alert("Location permission denied");
      btn.innerText = "Use Current Location";
    });
  } else {
    alert("Location not supported");
  }
}



// 🚀 SEND TO TELEGRAM


async function sendToTelegram() {
  const btn = document.querySelector(".container button:last-of-type");
  const successMsg = document.getElementById("successMsg");

  let name = document.getElementById("name").value.trim();
  let mobile = document.getElementById("mobile").value.trim();
  let testname = document.getElementById("testname").value.trim();
  let location = document.getElementById("location").value.trim();
  let datetime = document.getElementById("datetime").value.trim();

  // ✅ VALIDATION
  if (!name || !mobile || !testname || !location || !datetime) {
    alert("Please fill all fields");
    return;
  }

  // 📱 MOBILE VALIDATION (India)
  if (!/^[6-9]\d{9}$/.test(mobile)) {
    alert("Enter valid mobile number");
    return;
  }

  // 🔄 LOADING STATE
  btn.innerText = "Booking...";
  btn.disabled = true;

  // ✨ CLEAN MESSAGE FORMAT
  let message = `
  🧪 *New Lab Booking*

  👤 *Name:* ${name}
  📞 *Mobile:* ${mobile}
  🧬 *Test:* ${testname}
  📍 *Location:* ${location}
  📅 *Date & Time:* ${datetime}
  `;

  // 🔐 ⚠️ REPLACE WITH NEW TOKEN (DO NOT USE OLD ONE)
  let token = "8674468800:AAG-Th-PKddYC9TeIuSkBLrP5g2Vxo3y14A";
  let chat_id = "8771789372";

  let url = `https://api.telegram.org/bot${token}/sendMessage`;

  try {
    let response = await fetch(url, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        chat_id: chat_id,
        text: message,
        parse_mode: "Markdown"
      })
    });

    let data = await response.json();

    if (data.ok) {
      successMsg.style.display = "block";

      // 🧹 RESET FORM
      document.getElementById("name").value = "";
      document.getElementById("mobile").value = "";
      document.getElementById("testname").value = "";
      document.getElementById("location").value = "";
      document.getElementById("datetime").value = "";

      btn.innerText = "Book Now";
      btn.disabled = false;

    } else {
      throw new Error("Telegram API error");
    }

  } catch (error) {
    alert("❌ Failed to send booking. Try again.");
    btn.innerText = "Book Now";
    btn.disabled = false;
  }
}


function visitWebsite() {
  window.open("https://rapidlabs.in", "_blank");
}
</script>


</body>
</html>
